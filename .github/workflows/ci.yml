name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Ruff
        run: python -m pip install "ruff>=0.9.0,<1"

      - name: Lint
        run: python -m ruff check .

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: >-
          python -m pip install -e ".[duckdb]"
          "pytest>=8.0.0,<10"
          "pytest-cov>=5.0.0,<8"

      - name: Run tests with branch coverage
        run: >-
          python -m pytest
          --cov=geo_monitor
          --cov-report=term-missing:skip-covered
          --cov-report=xml

  minimum-openai:
    name: OpenAI SDK 1.66 compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install the minimum supported SDK
        run: >-
          python -m pip install -e .
          "openai==1.66.0"
          "pytest>=8.0.0,<10"

      - name: Verify the resolved SDK version
        run: python -c "import openai; assert openai.__version__ == '1.66.0', openai.__version__"

      - name: Exercise adapter and retry compatibility
        run: >-
          python -m pytest
          tests/test_adapter_profiles.py
          tests/test_resilience.py
          tests/test_config.py

  native-provider-sdks:
    name: Native provider SDK contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install native provider SDKs
        run: >-
          python -m pip install -e ".[providers-all]"
          "pytest>=8.0.0,<10"

      - name: Verify SDK imports and provider contracts
        run: |
          python -c "from dashscope import Generation; from volcenginesdkarkruntime import Ark; assert Generation and Ark"
          python -m pytest tests/test_provider_backends.py tests/test_adapter_profiles.py

  package:
    name: Build and wheel smoke
    needs: [lint, test, minimum-openai, native-provider-sdks]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build frontend
        run: python -m pip install "build>=1.2.0,<2"

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Verify distribution contents
        run: python tests/verify_distribution.py dist

      - name: Install wheel into an isolated environment
        run: |
          python -m venv /tmp/geo-monitor-wheel-smoke
          /tmp/geo-monitor-wheel-smoke/bin/python -m pip install dist/*.whl

      - name: Smoke test lean wheel, CLI, API, intelligence, and reports
        run: |
          /tmp/geo-monitor-wheel-smoke/bin/geo-monitor --help
          cd /tmp
          /tmp/geo-monitor-wheel-smoke/bin/python - <<'PY'
          import importlib.util
          from pathlib import Path

          from geo_monitor import run_geo_monitor
          from geo_monitor.analysis.intelligence import INTELLIGENCE_SCHEMA_VERSION
          from geo_monitor.report_model import REPORT_MODEL_SCHEMA_VERSION
          from geo_monitor.reporting import render_report_bundle

          assert callable(run_geo_monitor)
          assert INTELLIGENCE_SCHEMA_VERSION == "geo-intelligence-v1"
          assert importlib.util.find_spec("duckdb") is None

          model, reports = render_report_bundle(
              {
                  "title": "wheel smoke",
                  "job_id": "wheel-smoke",
                  "sample_mode": "mock",
                  "success_record_count": 0,
                  "data_quality": {"conclusion_strength": "observational"},
              },
              Path("/tmp/geo-monitor-wheel-report"),
          )
          assert model.schema_version == REPORT_MODEL_SCHEMA_VERSION
          assert reports["markdown"].read_text(encoding="utf-8").startswith("# wheel smoke")
          assert reports["pdf"].read_bytes().startswith(b"%PDF-")

          from geo_monitor.db import DuckDBError, build_duckdb
          try:
              build_duckdb(Path("/tmp/empty-runs"), Path("/tmp/empty.duckdb"))
          except DuckDBError as exc:
              assert "geo-monitor[duckdb]" in str(exc)
          else:
              raise AssertionError("DuckDB extension unexpectedly available in core wheel")
          PY

  # This network-backed dependency check is isolated from deterministic tests so
  # resolution/service failures have a distinct status instead of masquerading
  # as product test failures.
  dependency-audit:
    name: Dependency security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project providers and audit tool
        run: python -m pip install ".[providers-all]" "pip-audit>=2.7.0,<3"

      - name: Audit resolved project dependencies
        run: |
          python -m pip freeze --exclude geo-monitor > audit-requirements.txt
          python -m pip_audit \
            --strict \
            --progress-spinner off \
            --format json \
            --output pip-audit.json \
            --requirement audit-requirements.txt

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: pip-audit.json
          if-no-files-found: ignore
          retention-days: 14
