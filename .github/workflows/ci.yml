name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-build-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Build package
        run: python -m build

      - name: Install wheel and smoke test CLI
        run: |
          python -m venv /tmp/geo-monitor-wheel-smoke
          /tmp/geo-monitor-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/geo-monitor-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/geo-monitor-wheel-smoke/bin/geo-monitor --help
          /tmp/geo-monitor-wheel-smoke/bin/python -m geo_monitor.cli --help
          /tmp/geo-monitor-wheel-smoke/bin/python -c "from geo_monitor import run_geo_monitor; print(run_geo_monitor)"
