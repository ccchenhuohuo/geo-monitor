name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Ruff
        run: python -m pip install "ruff>=0.9.0,<1"

      - name: Lint
        run: python -m ruff check .

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: >-
          python -m pip install -e .
          "pytest>=8.0.0,<10"
          "pytest-cov>=5.0.0,<8"

      - name: Run tests with branch coverage
        run: >-
          python -m pytest
          --cov=geo_monitor
          --cov-report=term-missing:skip-covered
          --cov-report=xml

  minimum-openai:
    name: OpenAI SDK 1.66 compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install the minimum supported SDK
        run: >-
          python -m pip install -e .
          "openai==1.66.0"
          "pytest>=8.0.0,<10"

      - name: Verify the resolved SDK version
        run: python -c "import openai; assert openai.__version__ == '1.66.0', openai.__version__"

      - name: Exercise adapter and client compatibility
        run: >-
          python -m pytest
          tests/test_adapter_profiles.py
          tests/test_llm_client.py
          tests/test_config.py

  package:
    name: Build and wheel smoke
    needs: [lint, test, minimum-openai]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build frontend
        run: python -m pip install "build>=1.2.0,<2"

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Verify distribution contents
        run: python tests/verify_distribution.py dist

      - name: Install wheel into an isolated environment
        run: |
          python -m venv /tmp/geo-monitor-wheel-smoke
          /tmp/geo-monitor-wheel-smoke/bin/python -m pip install dist/*.whl

      - name: Smoke test installed CLI, API, resources, and intelligence package
        run: |
          /tmp/geo-monitor-wheel-smoke/bin/geo-monitor --help
          cd /tmp
          /tmp/geo-monitor-wheel-smoke/bin/python - <<'PY'
          from importlib import resources

          from geo_monitor import run_geo_monitor
          from geo_monitor.analysis.intelligence import INTELLIGENCE_SCHEMA_VERSION

          assert callable(run_geo_monitor)
          assert INTELLIGENCE_SCHEMA_VERSION == "geo-intelligence-v1"
          checks = [
              ("geo_monitor.data", "job_config.schema.json"),
              ("geo_monitor.examples", "job_config.example.json"),
              ("geo_monitor.docs", "README.zh-CN.md"),
              ("geo_monitor.docs", "intelligence.md"),
              ("geo_monitor.docs", "metrics.md"),
              ("geo_monitor.docs", "providers.md"),
          ]
          for package, name in checks:
              content = resources.files(package).joinpath(name).read_text(encoding="utf-8")
              assert content.strip(), f"empty package resource: {package}/{name}"
          PY

  # This network-backed dependency check is isolated from deterministic tests so
  # resolution/service failures have a distinct status instead of masquerading
  # as product test failures.
  dependency-audit:
    name: Dependency security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install audit tool
        run: python -m pip install "pip-audit>=2.7.0,<3"

      - name: Audit resolved project dependencies
        run: >-
          python -m pip_audit
          --strict
          --progress-spinner off
          --format json
          --output pip-audit.json
          .

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json
          if-no-files-found: ignore
          retention-days: 14
